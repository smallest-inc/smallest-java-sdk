plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'ai.smallest'
version = '0.1.5'

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
    withSourcesJar()
    withJavadocJar()
}

// Compile against the Java 11 API surface (not just the bytecode level) so the SDK
// runs on Java 11 runtimes and post-11 API calls fail at build time, not at runtime.
tasks.withType(JavaCompile).configureEach {
    options.release = 11
}

dependencies {
    api 'com.squareup.okhttp3:okhttp:4.12.0'
    api 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
    api 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.2'
    api 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'
    compileOnly 'org.jetbrains:annotations:24.1.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.withType(Javadoc).configureEach {
    options.addStringOption('Xdoclint:none', '-quiet')
}

publishing {
    publications {
        maven(MavenPublication) {
            artifactId = 'smallest-java-sdk'
            from components.java
            pom {
                name = 'Smallest AI Java SDK'
                description = 'Official Java client for the Smallest AI API (Waves TTS/STT and Atoms voice agents).'
                url = 'https://github.com/smallest-inc/smallest-java-sdk'
            }
        }
    }
}
